name: Flutter Nightly Build

on:
  # Nightly desactivada en el fork VEXEO: se compila por tag (flutter-tag.yml)
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
